<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cavas 2D</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container py-4">
        <div class="encabezado-lab text-center mb-5">
            <h1 class="fw-bold">Pruebas Canvas</h1>
            <p class="text-muted mb-0">
                Pruebas de figuras y trazos con Canvas 2D
            </p>
        </div>

        <div class="row g-4 justify-content-center">

            <div class="col-12 col-sm-6 col-lg-4 col-xl-3">
                <div class="card card-lab h-100">
                    <div class="card-body text-center">
                        <h3 class="titulo-canvas">Cuadrado</h3>
                        <div class="canvas-container">
                            <canvas id="canvasCuadrado" width="300" height="150"></canvas>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-12 col-sm-6 col-lg-4 col-xl-3">
                <div class="card card-lab h-100">
                    <div class="card-body text-center">
                        <h3 class="titulo-canvas">Rectángulo</h3>
                        <div class="canvas-container">
                            <canvas id="canvasRectangulo" width="150" height="150"></canvas>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-12 col-sm-6 col-lg-4 col-xl-3">
                <div class="card card-lab h-100">
                    <div class="card-body text-center">
                        <h3 class="titulo-canvas">Triángulo</h3>
                        <div class="canvas-container">
                            <canvas id="canvasTriangulo" width="100" height="100"></canvas>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-12 col-sm-6 col-lg-4 col-xl-3">
                <div class="card card-lab h-100">
                    <div class="card-body text-center">
                        <h3 class="titulo-canvas">Happy Face</h3>
                        <div class="canvas-container">
                            <canvas id="canvasCara" width="150" height="150"></canvas>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-12 col-sm-6 col-lg-4 col-xl-3">
                <div class="card card-lab h-100">
                    <div class="card-body text-center">
                        <h3 class="titulo-canvas">Líneas</h3>
                        <div class="canvas-container">
                            <canvas id="canvasLineas" width="150" height="150"></canvas>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-12 col-sm-6 col-lg-4 col-xl-3">
                <div class="card card-lab h-100">
                    <div class="card-body text-center">
                        <h3 class="titulo-canvas">Arcos</h3>
                        <div class="canvas-container">
                            <canvas id="canvasArcos" width="150" height="200"></canvas>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-12 col-sm-6 col-lg-4 col-xl-3">
                <div class="card card-lab h-100">
                    <div class="card-body text-center">
                        <h3 class="titulo-canvas">Bézier</h3>
                        <div class="canvas-container">
                            <canvas id="canvasCurvas" width="150" height="150"></canvas>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-12 col-sm-6 col-lg-4 col-xl-3">
                <div class="card card-lab h-100">
                    <div class="card-body text-center">
                        <h3 class="titulo-canvas">Combinación</h3>
                        <div class="canvas-container">
                            <canvas id="canvasCombinaciones" width="150" height="150"></canvas>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
